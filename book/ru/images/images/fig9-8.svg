<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 780 420" width="780" height="420" style="background:#ffffff">
<defs><marker id="ah" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#333333"/></marker><marker id="ah-light" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#999999"/></marker></defs>

<rect x="35" y="60" width="340" height="180" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="205" y="80" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">· Парадигма файловой системы · Agentic RAG</text>
<text x="47" y="98" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Мышь:</text>
<text x="105" y="98" font-family="'Courier New', Courier, monospace" font-size="10" fill="#333333" text-anchor="start" dominant-baseline="central">mouse_move · left/right/middle_click</text>
<text x="105" y="114" font-family="'Courier New', Courier, monospace" font-size="9" fill="#333333" text-anchor="start" dominant-baseline="central">double/triple_click · left_click_drag</text>
<text x="105" y="130" font-family="'Courier New', Courier, monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">left_mouse_down/up</text>
<text x="47" y="152" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Клавиатура:</text>
<text x="105" y="152" font-family="'Courier New', Courier, monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">type (посимвольно, интервал 12ms)</text>
<text x="105" y="168" font-family="'Courier New', Courier, monospace" font-size="8" fill="#333333" text-anchor="start" dominant-baseline="central">Одиночный Agent: рендеринг схемы × N итераций → взрыв контекста</text>
<text x="47" y="190" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Прокрутка:</text>
<text x="105" y="190" font-family="'Courier New', Courier, monospace" font-size="9" fill="#333333" text-anchor="start" dominant-baseline="central">scroll (прокрутка) в четырех направлениях + клавиши-модификаторы</text>
<rect x="400" y="60" width="345" height="100" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="572" y="80" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Восприятие действия</text>
<text x="412" y="98" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Скриншот:</text>
<text x="470" y="98" font-family="'Courier New', Courier, monospace" font-size="8" fill="#333333" text-anchor="start" dominant-baseline="central">Парадигма обучения · Обучение на опыте · Обнаружение и создание инструментов</text>
<text x="412" y="120" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Курсор:</text>
<text x="470" y="120" font-family="'Courier New', Courier, monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">cursor_position → (x, y)</text>
<text x="412" y="142" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Ожидание:</text>
<text x="470" y="142" font-family="'Courier New', Courier, monospace" font-size="9" fill="#333333" text-anchor="start" dominant-baseline="central">wait → Ожидание стабилизации интерфейса</text>
<rect x="400" y="175" width="345" height="65" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="572" y="195" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Понимание намерений + Извлечение информации</text>
<text x="412" y="213" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Терминал:</text>
<text x="470" y="213" font-family="'Courier New', Courier, monospace" font-size="9" fill="#333333" text-anchor="start" dominant-baseline="central">Персистентная bash-сессия · тайм-аут 120с</text>
<text x="470" y="229" font-family="'Courier New', Courier, monospace" font-size="9" fill="#333333" text-anchor="start" dominant-baseline="central">Обнаружение стоп-строки (sentinel string) завершено</text>
<rect x="35" y="255" width="340" height="65" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="205" y="275" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">user: «Как сегодня погода?»</text>
<text x="47" y="293" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">Операция:</text>
<text x="105" y="293" font-family="'Courier New', Courier, monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">view · create · str_replace</text>
<text x="105" y="309" font-family="'Courier New', Courier, monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">insert · undo_edit</text>
<rect x="400" y="255" width="345" height="65" rx="4" fill="#f5f5f5" stroke="#333333" stroke-width="2"/>
<text x="572" y="275" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Механизм масштабирования координат</text>
<text x="572" y="295" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Фактическое разрешение ↔ Разрешение обучения (XGA/WXGA/FWXGA)</text>
<text x="572" y="310" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Уменьшение скриншота → Рассуждение модели → Увеличение координат → Выполнение xdotool</text>
<rect x="35" y="335" width="710" height="110" rx="4" fill="#f5f5f5" stroke="#333333" stroke-width="2"/>
<text x="390" y="357" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">End-to-end голосовой token</text>
<text x="123" y="385" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">① screenshot</text>
<text x="123" y="403" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Кластерное резюме C</text>
<line x1="186" y1="391" x2="196" y2="391" stroke="#999999" stroke-width="2" marker-end="url(#ah-light)"/>
