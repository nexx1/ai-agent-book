<!-- Details under Tools -->
<rect x="490" y="295" width="240" height="72" rx="6" fill="#f5f5f5" stroke="#999999" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="610" y="315" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#555555" text-anchor="middle">Гл. 4 Инструменты  Гл. 5 Кодогенерация</text>
<text x="610" y="335" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#888888" text-anchor="middle">MCP  Асинхронная архитектура  Безопасность</text>
<text x="610" y="355" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#888888" text-anchor="middle">Код как мышление  Bootstrapping</text>
