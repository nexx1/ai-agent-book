<!-- Applications at bottom -->
<rect x="195" y="400" width="390" height="60" rx="8" fill="#f0f0f0" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>
<text x="390" y="422" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#333333" text-anchor="middle" font-weight="bold">Гл. 8 Самоэволюция  Гл. 9 Мультимодальность  Гл. 10 Мульти-Agent</text>
