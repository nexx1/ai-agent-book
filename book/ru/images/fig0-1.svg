<text x="170" y="315" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#555555" text-anchor="middle">Гл. 2 Контекст  Гл. 3 База знаний</text>
